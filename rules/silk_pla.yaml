name: Bambu Silk PLA+ tuning
description: >
  Slower speeds and reduced acceleration to prevent stringing and improve
  surface finish on silk-grade PLA filaments. Values are starting points
  from Bambu's published filament tuning guidance — verify against your
  specific spool and adjust via the web editor if needed.
match:
  filament_settings_id_contains: Silk
  filament_vendor: Bambu Lab
  filament_type: PLA
overrides:
  outer_wall_speed: 80
  inner_wall_speed: 150
  sparse_infill_speed: 150
  internal_solid_infill_speed: 150
  top_surface_speed: 80
  gap_infill_speed: 80
  default_acceleration: 3000
  outer_wall_acceleration: 2000
  inner_wall_acceleration: 3000
  initial_layer_acceleration: 500
priority: 10
enabled: true
