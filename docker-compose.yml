services:
  converter:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SITE_URL: "${VITE_SITE_URL:-http://localhost:8084}"
        VITE_GA_MEASUREMENT_ID: "${GA_MEASUREMENT_ID:-}"
        VITE_CF_BEACON_TOKEN: "${CF_BEACON_TOKEN:-}"
    ports:
      - "8084:8080"
    volumes:
      # Bundled reference profiles (mounted for live editing in dev).
      - ./profiles:/app/profiles
      # User-supplied reference profiles shadow the bundled ones.
      - ./user_profiles:/app/user_profiles
      # YAML filament-tuning rules — editable from the web UI or directly.
      - ./rules:/app/rules
      # Bambu target reference profiles (drop additional Bambu .3mf reference
      # profiles here to enable the Bambu→Bambu alpha flow).
      - ./bambu_profiles:/app/bambu_profiles
      # Converted output files (inspect directly from host).
      - ./tmp:/app/tmp
      # Failed conversion workdirs — retained when RETAIN_FAILED_FILES=true.
      - ./tmp_failed:/app/tmp_failed
      # Feedback submissions — persisted on host.
      - ./feedback:/app/feedback
    environment:
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-200}"
      CLEANUP_TEMP_AFTER_SECONDS: "${CLEANUP_TEMP_AFTER_SECONDS:-300}"
      RETAIN_FAILED_FILES: "${RETAIN_FAILED_FILES:-false}"
      OTEL_ENABLED: "${OTEL_ENABLED:-false}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-u13mf-converter}"
      GA_MEASUREMENT_ID: "${GA_MEASUREMENT_ID:-}"
      CF_BEACON_TOKEN: "${CF_BEACON_TOKEN:-}"
      DOMAINHOST: "${DOMAINHOST:-localhost}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
