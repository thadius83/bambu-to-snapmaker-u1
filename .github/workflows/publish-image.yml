name: Publish Docker Image

on:
  push:
    branches: ['main']
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Updated from v4

      - name: Log in to GHCR
        uses: docker/login-action@v4 # Updated from v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v7 # Updated from v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bambu-to-snapmaker-u1:latest
